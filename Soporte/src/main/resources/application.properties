spring.application.name=SoporteM
server.port= 8093

spring.datasource.url=jdbc:mysql://localhost:3306/soporteDB
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

usuario.service.url=http://localhost:8080

spring.cloud.openfeign.circuitbreaker.enabled=true

logging.level.com.SoporteM=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{0}] - %msg%n